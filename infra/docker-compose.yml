version: '3.3'

volumes:
  pg_data:
  static:
  media:

services:
  db:
    image: postgres:13
    container_name: foodgram_db
    restart: always
    volumes:
      - pg_data:/var/lib/postgresql/data/
    env_file:
      - ../.env

  backend:
    container_name: foodgram_backend
    build: ../backend
    restart: always
    volumes:
      - static:/backend_static/
      - media:/app/media/
    env_file:
      - ../.env
    depends_on:
      - db

  frontend:
    container_name: foodgram_frontend
    build: ../frontend
    volumes:
      - static:/frontend_static
    command: cp -r /app/build/. /frontend_static/
    env_file:
      - ../.env

  nginx:
    container_name: foodgram_gateway
    image: nginx:1.25.4-alpine
    restart: always
    ports:
      - "8000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static:/staticfiles/
      - media:/app/media/
    depends_on:
      - frontend
      - backend
